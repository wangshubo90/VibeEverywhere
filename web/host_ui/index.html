<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VibeEverywhere Host Admin</title>
  <link rel="stylesheet" href="/ui/app.css">
</head>
<body>
  <main>
    <header class="hero panel">
      <div>
        <h1>Host Admin</h1>
        <p>Local-only approval, config, and live session management for the daemon.</p>
      </div>
      <div class="actions">
        <button id="refresh-all" class="primary">Refresh All</button>
      </div>
    </header>

    <section class="layout">
      <div class="column">
        <section class="panel">
          <div class="section-head">
            <h2>Host Config</h2>
          </div>
          <pre id="host-info" class="output">loading...</pre>
          <div class="actions">
            <a id="download-cert" href="/host/tls/certificate">Download Remote TLS Certificate</a>
          </div>
          <form id="config-form" class="stack">
            <label>
              <span>Display Name</span>
              <input id="display-name" name="displayName" placeholder="Display name">
            </label>
            <label>
              <span>Admin Host</span>
              <input id="admin-host" name="adminHost" placeholder="127.0.0.1">
            </label>
            <label>
              <span>Admin Port</span>
              <input id="admin-port" name="adminPort" type="number" min="1" max="65535" placeholder="18085">
            </label>
            <label>
              <span>Remote Host</span>
              <input id="remote-host" name="remoteHost" placeholder="0.0.0.0">
            </label>
            <label>
              <span>Remote Port</span>
              <input id="remote-port" name="remotePort" type="number" min="1" max="65535" placeholder="18086">
            </label>
            <label>
              <span>Codex Command</span>
              <input id="codex-command" name="codexCommand" placeholder='codex --flag'>
            </label>
            <label>
              <span>Claude Command</span>
              <input id="claude-command" name="claudeCommand" placeholder='claude --print'>
            </label>
            <button type="submit">Save Host Config</button>
          </form>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2>Pending Pairings</h2>
            <button id="refresh-pairings" class="ghost">Refresh</button>
          </div>
          <div id="pending-actions" class="list"></div>
          <pre id="pending-list" class="output">loading...</pre>
          <form id="approve-form" class="stack">
            <label>
              <span>Pairing ID</span>
              <input id="pairing-id" name="pairingId" placeholder="Pairing ID">
            </label>
            <label>
              <span>Code</span>
              <input id="pairing-code" name="code" placeholder="Code">
            </label>
            <button type="submit">Approve Pairing</button>
          </form>
          <pre id="approve-result" class="output small">No approvals yet.</pre>
        </section>
      </div>

      <div class="column wide">
        <section class="panel">
          <div class="section-head">
            <h2>Sessions</h2>
            <div class="actions">
              <button id="clear-inactive-sessions" class="ghost">Clear Inactive</button>
              <button id="refresh-sessions" class="ghost">Refresh</button>
            </div>
          </div>
          <div id="sessions-list" class="list"></div>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2>File Inspector</h2>
          </div>
          <div id="file-inspector" class="file-inspector">
            <div class="empty-note">Select a session file to inspect it here.</div>
          </div>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2>Client Connections</h2>
            <button id="refresh-clients" class="ghost">Refresh</button>
          </div>
          <div id="clients-list" class="list"></div>
        </section>

        <section class="panel">
          <div class="section-head">
            <h2>Events</h2>
          </div>
          <pre id="events" class="output event-log"></pre>
        </section>
      </div>
    </section>
  </main>

  <script src="/ui/app.js"></script>
</body>
</html>
