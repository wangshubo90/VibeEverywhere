name: Build Packaged Web Assets
description: Build host-admin assets from Sentrits-Core and packaged remote assets from Sentrits-Web

inputs:
  web-repo-path:
    description: Path to the checked-out Sentrits-Web repository
    required: true
  node-version:
    description: Node.js version to use
    required: false
    default: "22"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: |
          frontend/package-lock.json
          ${{ inputs.web-repo-path }}/package-lock.json

    - name: Install host-admin dependencies
      shell: bash
      working-directory: frontend
      run: npm ci

    - name: Build host-admin assets
      shell: bash
      working-directory: frontend
      run: npm run build:host-admin

    - name: Install Sentrits-Web dependencies
      shell: bash
      working-directory: ${{ inputs.web-repo-path }}
      run: npm ci

    - name: Build Sentrits-Web assets
      shell: bash
      working-directory: ${{ inputs.web-repo-path }}
      run: npm run build
