name: Release Packaging

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve-web-revision:
    runs-on: ubuntu-24.04
    outputs:
      web_revision: ${{ steps.resolve.outputs.web_revision }}

    steps:
      - name: Checkout Sentrits-Core
        uses: actions/checkout@v4

      - name: Read pinned Sentrits-Web revision
        id: resolve
        run: |
          set -euo pipefail
          WEB_REVISION="$(tr -d '\n' < packaging/sentrits-web-revision.txt)"
          test -n "$WEB_REVISION"
          echo "web_revision=$WEB_REVISION" >> "$GITHUB_OUTPUT"

  package-debian:
    needs: resolve-web-revision
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Sentrits-Core
        uses: actions/checkout@v4

      - name: Checkout Sentrits-Web
        uses: actions/checkout@v4
        with:
          repository: shubow-sentrits/Sentrits-Web
          ref: ${{ needs.resolve-web-revision.outputs.web_revision }}
          path: Sentrits-Web
          ssh-key: ${{ secrets.DEPLOY_KEY_SENTRITS_WEB }}

      - name: Build packaged web assets
        uses: ./.github/actions/package-web-assets
        with:
          web-repo-path: ${{ github.workspace }}/Sentrits-Web

      - name: Install Linux packaging toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libboost-all-dev libssl-dev

      - name: Configure Linux packaging build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DSENTRITS_BUILD_TESTS=ON \
            -DSENTRITS_WEB_REPO="${GITHUB_WORKSPACE}/Sentrits-Web"

      - name: Build Debian package
        run: cmake --build build --target sentrits_package_deb

      - name: Smoke Debian install and uninstall
        run: |
          set -euo pipefail
          DEB_PATH="$(ls build/*.deb)"
          sudo dpkg -i "$DEB_PATH"
          test -x /usr/bin/sentrits
          test -f /usr/lib/sentrits/www/_metadata/sentrits-web-revision.txt
          TMP_HOME="$(mktemp -d)"
          HOME="$TMP_HOME" /usr/bin/sentrits service print > "$TMP_HOME/service-print.txt"
          HOME="$TMP_HOME" /usr/bin/sentrits service install > "$TMP_HOME/service-install.txt"
          test -f "$TMP_HOME/.config/systemd/user/sentrits.service"
          grep -q "Environment=SENTRITS_WEB_ROOT=/usr/lib/sentrits/www" "$TMP_HOME/.config/systemd/user/sentrits.service"
          grep -q "installed service file:" "$TMP_HOME/service-install.txt"
          sudo dpkg -r sentrits
          test ! -e /usr/bin/sentrits

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sentrits-debian-package-${{ github.ref_name }}
          path: build/*.deb

  package-macos:
    needs: resolve-web-revision
    runs-on: macos-14

    steps:
      - name: Checkout Sentrits-Core
        uses: actions/checkout@v4

      - name: Checkout Sentrits-Web
        uses: actions/checkout@v4
        with:
          repository: shubow-sentrits/Sentrits-Web
          ref: ${{ needs.resolve-web-revision.outputs.web_revision }}
          path: Sentrits-Web
          ssh-key: ${{ secrets.DEPLOY_KEY_SENTRITS_WEB }}

      - name: Build packaged web assets
        uses: ./.github/actions/package-web-assets
        with:
          web-repo-path: ${{ github.workspace }}/Sentrits-Web

      - name: Install macOS packaging toolchain
        run: |
          brew install boost openssl@3 ninja

      - name: Configure macOS packaging build
        env:
          OPENSSL_ROOT_DIR: /opt/homebrew/opt/openssl@3
          CMAKE_PREFIX_PATH: /opt/homebrew/opt/boost;/opt/homebrew/opt/openssl@3
        run: |
          cmake -S . -B build -G Ninja \
            -DSENTRITS_BUILD_TESTS=ON \
            -DSENTRITS_WEB_REPO="${GITHUB_WORKSPACE}/Sentrits-Web"

      # Builds the DMG (primary artifact) and tar.gz (secondary artifact).
      # The sentrits_package_macos_dmg target depends on sentrits_package_macos,
      # so both outputs are produced in one step.
      - name: Build macOS packages (DMG + tar.gz)
        run: cmake --build build --target sentrits_package_macos_dmg

      - name: Smoke tar.gz install and uninstall
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$(ls build/*.tar.gz)"
          TMP_ROOT="$(mktemp -d)"
          INSTALL_ROOT="$TMP_ROOT/install"
          HOME_ROOT="$TMP_ROOT/home"
          mkdir -p "$INSTALL_ROOT" "$HOME_ROOT"
          tar -xzf "$ARCHIVE_PATH" -C "$INSTALL_ROOT"
          BIN="$INSTALL_ROOT/Sentrits/bin/sentrits"
          HOME="$HOME_ROOT" "$BIN" service print > "$TMP_ROOT/service-print.txt"
          HOME="$HOME_ROOT" "$BIN" service install > "$TMP_ROOT/service-install.txt"
          PLIST="$HOME_ROOT/Library/LaunchAgents/io.sentrits.agent.plist"
          test -x "$BIN"
          test -f "$INSTALL_ROOT/Sentrits/share/sentrits/launchd/io.sentrits.agent.plist"
          test -f "$INSTALL_ROOT/Sentrits/lib/sentrits/www/_metadata/sentrits-web-revision.txt"
          test -f "$PLIST"
          grep -q "$INSTALL_ROOT/Sentrits/bin/sentrits" "$PLIST"
          grep -q "$INSTALL_ROOT/Sentrits/lib/sentrits/www" "$PLIST"
          grep -q "installed service file:" "$TMP_ROOT/service-install.txt"
          rm -f "$PLIST"
          rm -rf "$INSTALL_ROOT/Sentrits"
          test ! -e "$PLIST"
          test ! -e "$INSTALL_ROOT/Sentrits"

      - name: Smoke DMG contents
        run: |
          set -euo pipefail
          DMG_PATH="$(ls build/*.dmg)"
          MOUNT_POINT="$(mktemp -d)"
          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_POINT" -quiet -nobrowse
          test -x "$MOUNT_POINT/Sentrits/bin/sentrits"
          test -f "$MOUNT_POINT/Sentrits/lib/sentrits/www/_metadata/sentrits-web-revision.txt"
          test -f "$MOUNT_POINT/Sentrits/share/sentrits/launchd/io.sentrits.agent.plist"
          hdiutil detach "$MOUNT_POINT" -quiet

      - name: Upload macOS package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentrits-macos-package-${{ github.ref_name }}
          path: |
            build/*.dmg
            build/*.tar.gz

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - package-debian
      - package-macos
    runs-on: ubuntu-24.04

    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@v4
        with:
          name: sentrits-debian-package-${{ github.ref_name }}
          path: release-assets

      - name: Download macOS package artifacts
        uses: actions/download-artifact@v4
        with:
          name: sentrits-macos-package-${{ github.ref_name }}
          path: release-assets

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: |
          sha256sum * > SHA256SUMS
          echo "Checksums:"
          cat SHA256SUMS

      # Optional: sign SHA256SUMS with a GPG key stored in CI secrets.
      # Set GPG_PRIVATE_KEY (armored private key) and optionally GPG_PASSPHRASE.
      # If GPG_PRIVATE_KEY is absent or empty, this step skips cleanly.
      - name: Sign checksums (optional)
        working-directory: release-assets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "GPG_PRIVATE_KEY not configured — skipping checksum signing"
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          printf '%s' "${GPG_PASSPHRASE:-}" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 --detach-sign --armor --output SHA256SUMS.asc SHA256SUMS
          echo "Checksum signature written to SHA256SUMS.asc"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
